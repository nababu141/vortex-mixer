<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAMOND VORTEX | Anonymous Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #0a110f 0%, #050505 100%); color: #00ffcc; min-height: 100vh; font-family: 'Courier New', monospace; }
        .vortex-card { border: 1px solid rgba(0, 255, 204, 0.3); background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); }
        .btn-vortex { background: #00ffcc; color: #000; font-weight: bold; transition: all 0.3s; text-transform: uppercase; }
        .btn-vortex:hover { box-shadow: 0 0 25px #00ffcc; transform: translateY(-2px); }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-sm">
    <div class="vortex-card w-full max-w-md rounded-3xl p-8 border">
        <h1 class="text-3xl font-black text-center tracking-tighter mb-2 italic">DIAMOND VORTEX</h1>
        <p class="text-[9px] text-center tracking-[0.5em] opacity-40 mb-8">OFFSHORE ASSET MIXER</p>

        <div id="dep-ui" class="space-y-4">
            <button id="btnGen" onclick="genereazaBilet()" class="btn-vortex w-full py-4 rounded-xl shadow-lg">Generate Deposit Ticket</button>
            <div id="res-gen" class="hidden p-5 bg-black/60 border border-[#00ffcc]/30 rounded-2xl space-y-3">
                <div>
                    <p class="text-[9px] opacity-50 uppercase mb-1">Secure Deposit Address:</p>
                    <div id="adrDep" class="font-bold text-white break-all bg-[#00ffcc]/5 p-3 rounded-lg border border-[#00ffcc]/10 text-xs text-center"></div>
                </div>
                <div>
                    <p class="text-[9px] opacity-50 uppercase mb-1 text-yellow-500 text-center font-bold">Secret Code (Keep it safe!):</p>
                    <div id="codSecret" class="font-black text-yellow-400 text-center text-xl bg-yellow-400/5 p-3 rounded-lg border border-yellow-400/20 tracking-wider font-bold"></div>
                </div>
            </div>
        </div>

        <div class="my-8 border-t border-[#00ffcc]/10"></div>

        <div class="space-y-4 bg-[#00ffcc]/5 p-5 rounded-2xl border border-[#00ffcc]/10">
            <h3 class="text-center text-[10px] tracking-widest opacity-60 font-bold uppercase text-bold italic">Blockchain Monitor</h3>
            <input type="text" id="statusCod" placeholder="ENTER SECRET CODE" class="w-full p-3 bg-black border border-[#00ffcc]/30 rounded-xl text-center text-[#00ffcc] outline-none">
            <button onclick="checkStatus()" class="w-full py-2 border border-[#00ffcc]/50 text-[#00ffcc] hover:bg-[#00ffcc] hover:text-black transition-all rounded-xl font-bold text-[10px]">SCAN DEPOSIT STATUS</button>
            <div id="statusResult" class="hidden text-center p-2 rounded-lg font-bold text-xs"></div>
        </div>

        <div class="my-8 border-t border-[#00ffcc]/10"></div>

        <div class="space-y-4">
            <h3 class="text-center text-[10px] tracking-widest opacity-60 font-bold uppercase text-bold italic">Withdrawal Protocol</h3>
            <input type="text" id="inputCod" placeholder="DIAMOND-XXXX CODE" class="w-full p-3 bg-black border border-white/10 rounded-xl text-center outline-none">
            <input type="text" id="inputDest" placeholder="DESTINATION ETH ADDRESS (BASE)" class="w-full p-3 bg-black border border-white/10 rounded-xl text-center outline-none text-[10px]">
            <button id="btnRetrage" onclick="retrageBani()" class="btn-vortex w-full py-4 rounded-xl">Lansare Furnici (Send)</button>
            <p id="msgRet" class="text-center text-[10px] mt-2 font-bold"></p>
        </div>
    </div>

    <script>
        const API_URL ="https://2znyxpowhd.localto.net";

        // Curățare la refresh (Securitate)
        window.onload = () => {
            const resGen = document.getElementById('res-gen');
            const statusRes = document.getElementById('statusResult');
            if(resGen) resGen.classList.add('hidden');
            if(statusRes) statusRes.classList.add('hidden');
            document.getElementById('msgRet').innerText = "";
            console.log("Session cleared for security.");
        };

        async function genereazaBilet() {
            const btn = document.getElementById('btnGen');
            btn.innerText = "CONNECTING...";
            try {
                const res = await fetch(`${API_URL}/genereaza`);
                if (!res.ok) throw new Error("Server error");
                const data = await res.json();
                document.getElementById('adrDep').innerText = data.adresa;
                document.getElementById('codSecret').innerText = data.cod;
                document.getElementById('res-gen').classList.remove('hidden');
                btn.style.display = "none";
            } catch (e) { 
                alert("Connection failed! Check if VPS is online."); 
                btn.innerText = "RETRY GENERATION";
            }
        }

        async function checkStatus() {
            const parola = document.getElementById('statusCod').value.trim();
            const resDiv = document.getElementById('statusResult');
            if (!parola) return;
            
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = "<span class='loading text-white'>SCANNING BASE NETWORK...</span>";
            
            try {
                const res = await fetch(`${API_URL}/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parola })
                });
                const data = await res.json();
                if (res.ok) {
                    resDiv.innerHTML = `STATUS: ${data.status} <br> SUM: ${data.suma} ETH`;
                    resDiv.style.color = "#00ffcc";
                } else {
                    resDiv.innerText = "INVALID OR EXPIRED CODE";
                    resDiv.style.color = "#ff4444";
                }
            } catch (e) { 
                resDiv.innerText = "SERVER CONNECTION LOST"; 
                resDiv.style.color = "#ff4444";
            }
        } // Aici era buba, acum e închisă corect!

        async function retrageBani() {
            const parola = document.getElementById('inputCod').value;
            const adresaDestinatie = document.getElementById('inputDest').value;
            const msg = document.getElementById('msgRet');
            msg.innerText = "INITIALIZING MIXER...";
            try {
                const res = await fetch(`${API_URL}/retragere`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parola, adresaDestinatie })
                });
                const data = await res.json();
                msg.innerText = res.ok ? "SUCCESS! Funds have been sent." : "ERROR: " + data.eroare;
            } catch (e) { msg.innerText = "Connection error."; }
        }
    </script>
</body>
</html>
