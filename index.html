<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAMOND VORTEX | Secure Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #0a110f 0%, #050505 100%); color: #00ffcc; min-height: 100vh; font-family: 'Courier New', monospace; }
        .vortex-card { border: 1px solid rgba(0, 255, 204, 0.3); background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); box-shadow: 0 0 50px rgba(0, 255, 204, 0.05); }
        .btn-vortex { background: #00ffcc; color: #000; font-weight: bold; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-vortex:hover { box-shadow: 0 0 25px #00ffcc; transform: translateY(-2px); }
        .input-vortex { background: rgba(0,0,0,0.6) !important; border: 1px solid rgba(0, 255, 204, 0.2) !important; color: #00ffcc !important; }
        .input-vortex:focus { border-color: #00ffcc !important; box-shadow: 0 0 10px rgba(0, 255, 204, 0.1); }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse-slow 1.5s infinite; }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-sm">
    <div class="vortex-card w-full max-w-md rounded-3xl p-8 border">
        <h1 class="text-3xl font-black text-center tracking-tighter mb-2 italic glow-text">DIAMOND VORTEX</h1>
        <p class="text-[9px] text-center tracking-[0.5em] opacity-40 mb-8">OFFSHORE DIGITAL ASSET MIXER</p>

        <div id="dep-ui" class="space-y-4">
            <button id="btnGen" onclick="genereazaBilet()" class="btn-vortex w-full py-4 rounded-xl shadow-lg">
                Generare Bilet Depozit
            </button>
            <div id="res-gen" class="hidden p-5 bg-black/60 border border-[#00ffcc]/30 rounded-2xl space-y-3 animate-fadeIn">
                <div>
                    <p class="text-[9px] opacity-50 uppercase mb-1">Adresă Depozit Securizată:</p>
                    <div id="adrDep" class="font-bold text-white break-all bg-[#00ffcc]/5 p-3 rounded-lg border border-[#00ffcc]/10 text-xs"></div>
                </div>
                <div>
                    <p class="text-[9px] opacity-50 uppercase mb-1 text-yellow-500">Cod Secret (Strict Confidențial):</p>
                    <div id="codSecret" class="font-black text-yellow-400 text-center text-xl bg-yellow-400/5 p-3 rounded-lg border border-yellow-400/20 tracking-wider"></div>
                </div>
            </div>
        </div>

        <div class="my-8 border-t border-[#00ffcc]/10"></div>

        <div class="space-y-4 bg-[#00ffcc]/5 p-5 rounded-2xl border border-[#00ffcc]/10">
            <h3 class="text-center text-[10px] tracking-widest opacity-60 font-bold uppercase">Monitorizare Blockchain</h3>
            <input type="text" id="statusCod" placeholder="INTRODU CODUL PENTRU SCANARE" class="input-vortex w-full p-3 rounded-xl text-center outline-none">
            <button onclick="checkStatus()" class="w-full py-2 border border-[#00ffcc]/50 text-[#00ffcc] hover:bg-[#00ffcc] hover:text-black transition-all rounded-xl font-bold text-[10px]">VERIFICĂ STATUS ACTIV</button>
            <div id="statusResult" class="hidden text-center p-2 rounded-lg font-bold text-xs tracking-tight"></div>
        </div>

        <div class="my-8 border-t border-[#00ffcc]/10"></div>

        <div class="space-y-4">
            <h3 class="text-center text-[10px] tracking-widest opacity-60 font-bold uppercase">Protocol de Retragere</h3>
            <input type="text" id="inputCod" placeholder="COD DIAMOND-XXXX" class="input-vortex w-full p-3 rounded-xl text-center outline-none">
            <input type="text" id="inputDest" placeholder="ADRESA ETH DESTINAȚIE (BASE)" class="input-vortex w-full p-3 rounded-xl text-center outline-none text-[10px]">
            <button id="btnRetrage" onclick="retrageBani()" class="btn-vortex w-full py-4 rounded-xl shadow-inner">
                Lansează Furnicile
            </button>
            <p id="msgRet" class="text-center text-[10px] mt-2 h-4 font-bold tracking-tight"></p>
        </div>
        
        <div class="mt-8 pt-4 border-t border-white/5 text-[8px] text-center opacity-20 uppercase tracking-[0.3em]">
            Vortex Protocol v13.3 | No logs saved | Anonymous Node
        </div>
    </div>

    <script>
        const API_URL = "https://pipes-limitation-defend-likely.trycloudflare.com";

        async function genereazaBilet() {
            const btn = document.getElementById('btnGen');
            btn.innerText = "SE GENEREAZĂ CHEILE...";
            try {
                const res = await fetch(`${API_URL}/genereaza`);
                const data = await res.json();
                document.getElementById('adrDep').innerText = data.adresa;
                document.getElementById('codSecret').innerText = data.cod;
                document.getElementById('res-gen').classList.remove('hidden');
                btn.style.display = "none";
            } catch (e) { 
                alert("Eroare Tunel! Verificați dacă serverul este Online."); 
                btn.innerText = "REÎNCEARCĂ";
            }
        }

        async function checkStatus() {
            const parola = document.getElementById('statusCod').value;
            const resDiv = document.getElementById('statusResult');
            resDiv.classList.remove('hidden');
            resDiv.innerHTML = "<span class='loading'>SE SCANEAZĂ NODURILE...</span>";
            try {
                const res = await fetch(`${API_URL}/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parola })
                });
                const data = await res.json();
                if (res.ok) {
                    resDiv.innerHTML = `PROTOCOL: ${data.status} <br> BALANȚĂ DETECTATĂ: ${data.suma} ETH`;
                    resDiv.style.color = data.status === "CONFIRMAT" ? "#00ffcc" : "#ffcc00";
                } else {
                    resDiv.innerText = "EROARE: COD INEXISTENT SAU EXPIRAT";
                    resDiv.style.color = "#ff4444";
                }
            } catch (e) { resDiv.innerText = "CONEXIUNE EȘUATĂ CU SERVERUL"; }
        }

        async function retrageBani() {
            const parola = document.getElementById('inputCod').value;
            const adresaDestinatie = document.getElementById('inputDest').value;
            const msg = document.getElementById('msgRet');
            const btn = document.getElementById('btnRetrage');
            
            msg.innerText = "INIȚIALIZARE MIXER... TE ROG AȘTEAPTĂ";
            msg.className = "text-center text-[10px] mt-2 font-bold tracking-tight text-yellow-500 loading";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const res = await fetch(`${API_URL}/retragere`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parola, adresaDestinatie })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.innerText = "SUCCES: FURNIZICILE AU PLECAT CĂTRE DESTINAȚIE!";
                    msg.style.color = "#00ffcc";
                    msg.classList.remove('loading');
                } else {
                    msg.innerText = "PROTOCOL REFUZAT: " + (data.eroare || "VERIFICĂ CODUL");
                    msg.style.color = "#ff4444";
                    msg.classList.remove('loading');
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }
            } catch (e) { 
                msg.innerText = "EROARE CRITICĂ DE REȚEA"; 
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
