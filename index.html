<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NABABU | High-Tier Privacy Protocol</title>
    <style>
        /* BRANDING NABABU - BOSTON STYLE */
        :root {
            --nababu-vortex: linear-gradient(135deg, #5e29a7 0%, #f18f1c 100%);
            --bg-deep: #020617;
            --panel-bg: #0f172a;
            --border-glow: #1e293b;
            --text-gold: #fbbf24;
            --accent-purple: #5e29a7;
            --success-green: #10b981;
        }

        body { 
            background: var(--bg-deep); 
            color: #94a3b8; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 0; 
            min-height: 100vh; 
            margin: 0; 
        }

        .main-layout { display: flex; justify-content: center; align-items: flex-start; gap: 30px; padding: 40px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        
        .side-panel { 
            width: 250px; 
            background: var(--panel-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-glow); 
            font-size: 11px; 
            line-height: 1.6; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }

        .side-panel h4 { 
            color: var(--text-gold); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 1px solid var(--accent-purple); 
            padding-bottom: 10px; 
            margin-top: 0; 
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border-glow); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        h1 { 
            background: var(--nababu-vortex);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; 
            font-weight: bold; 
            letter-spacing: 8px; 
            font-size: 32px; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            margin-top: 0; 
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; background: #1e293b; color: #94a3b8; border: none; padding: 12px; cursor: pointer; font-weight: 600; border-radius: 4px; transition: 0.3s; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .tab-btn.active { background: var(--nababu-vortex); color: #fff; }

        .card { display: none; margin-bottom: 25px; padding: 20px; background: #020617; border-radius: 8px; border: 1px solid var(--border-glow); }
        .card.active { display: block; animation: fadeIn 0.3s ease; }

        h3 { color: var(--text-gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid var(--accent-purple); padding-bottom: 10px; }

        button.main-btn { 
            background: var(--nababu-vortex); 
            color: #fff; 
            border: none; 
            padding: 15px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            transition: 0.3s; 
            border-radius: 4px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            box-shadow: 0 4px 15px rgba(94, 41, 167, 0.3);
        }

        button.main-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(241, 143, 28, 0.4); 
        }

        .log { 
            background: #000; 
            color: #10b981; 
            padding: 15px; 
            height: 150px; 
            overflow-y: auto; 
            font-size: 11px; 
            border: 1px solid var(--border-glow); 
            margin-top: 20px; 
            font-family: 'Courier New', monospace; 
            border-radius: 4px; 
            border-left: 3px solid var(--accent-purple); 
            line-height: 1.6; 
        }

        input { width: 100%; box-sizing: border-box; margin-bottom: 12px; padding: 12px; background: #020617; border: 1px solid var(--border-glow); color: #fff; border-radius: 4px; outline: none; font-family: monospace; }
        input:focus { border-color: #f18f1c; }

        .status-bar { display: flex; align-items: center; gap: 10px; margin-top: 20px; background: #020617; padding: 12px; border-radius: 4px; border: 1px dashed #334155; }
        #statusLed { width: 12px; height: 12px; background: #475569; border-radius: 50%; transition: 0.3s; }

        @keyframes fadeInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="side-panel">
        <h4>System Specs</h4>
        <div style="margin-bottom: 10px;">
            <span style="color: #64748b;">Network:</span> <span style="float: right; color: #38bdf8;">BASE (L2)</span>
        </div>
        <div style="margin-bottom: 10px;">
            <span style="color: #64748b;">Status:</span> <span style="float: right; color: #10b981;">ENCRYPTED</span>
        </div>
        <div class="status-bar">
            <div id="statusLed"></div>
            <span id="statusText" style="font-size: 10px; font-weight: bold; color: #64748b;">STANDBY</span>
        </div>
    </div>

    <div class="container">
        <h1>NABABU</h1>
        
        <div id="withdraw" class="card active">
            <h3>02 Finalize Protocol</h3>
            <input type="text" id="inputCod" placeholder="Enter NABABU-XXXX Key" autocomplete="off">
            <input type="text" id="inputDest" placeholder="Destination Address (ETH/BASE)" autocomplete="off">
            <button class="main-btn" onclick="processWithdraw()">Withdraw Funds</button>
        </div>

        <div class="log" id="terminalLog">
            <span style="color: #64748b;">>> Terminal initialized...</span><br>
            <span style="color: #64748b;">>> System ready. Waiting for instructions...</span>
        </div>
    </div>
</div>

<div id="notification-area" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

<script>
    // INTEGRAREA LOGICII TALE
    const log = document.getElementById('terminalLog');
    const led = document.getElementById('statusLed');
    const text = document.getElementById('statusText');

    function addLog(msg, color = "#10b981") {
        const span = document.createElement('span');
        span.style.color = color;
        span.innerHTML = `>> ${msg}<br>`;
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
    }

    async function processWithdraw() {
        const parola = document.getElementById('inputCod').value.trim().toUpperCase();
        const dest = document.getElementById('inputDest').value.trim();
        if(!parola || !dest) return addLog("[ERROR] Fields required!", "#ef4444");

        addLog(`Initiating Vortex Dispersion for ${parola}...`, "#fbbf24");
        
        // Simulare sau integrare cu API-ul tău existent
        try {
            // Aici vine fetch-ul tău către API_URL/api/withdraw
            addLog("🚀 [VORTEX] Stealth routing engaged!", "#f18f1c");
            led.style.background = '#10b981';
            text.innerText = "ACTIVE ROUTING";
        } catch (e) { addLog("[ERROR] Connection error.", "#ef4444"); }
    }

    // NOTIFICARILE DE TIP BALENA
    const activities = [
        "New Vault Generated (BASE)",
        "Privacy Mix: 1.45 ETH completed",
        "Stealth Node: Broadcasted",
        "Privacy Mix: 0.85 ETH completed",
        "Incoming deposit detected...",
        "Relayer: Path randomized"
    ];

    function showNotification() {
        const area = document.getElementById('notification-area');
        const toast = document.createElement('div');
        const content = activities[Math.floor(Math.random() * activities.length)];
        
        toast.style.cssText = `
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #1e293b;
            border-left: 4px solid #5e29a7;
            padding: 12px 20px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            animation: fadeInRight 0.5s ease-out;
        `;
        
        toast.innerHTML = `<span style="color: #64748b;">[${new Date().toLocaleTimeString()}]</span> ${content}`;
        area.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = "fadeOut 0.5s ease-in";
            setTimeout(() => toast.remove(), 500);
        }, 4000);
    }

    setInterval(showNotification, 18000);
</script>
</body>
</html>
